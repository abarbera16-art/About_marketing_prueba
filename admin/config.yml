backend:
  name: git-gateway
  branch: main # O la rama donde esté vuestra web

[cite_start]media_folder: "img" # Carpeta para las fotos de Luis o Raquel 
public_folder: "img"

collections:
  - name: "ponentes_col"
    label: "Gestión de Ponentes"
    [cite_start]folder: "data" # Apunta a vuestra carpeta data 
    extension: "json"
    format: "json"
    [cite_start]create: true # Permite añadir nuevos ponentes para el 26.03 [cite: 118]
    files:
      - label: "Lista Oficial de Ponentes"
        name: "lista_ponentes"
        file: "data/ponentes.json"
        fields:
          - label: "Ponentes"
            name: "ponentes"
            widget: "list"
            fields:
              - {label: "ID (ej: luis)", name: "id", widget: "string"}
              - {label: "Nombre", name: "nombre", widget: "string"}
              - {label: "Rol", name: "rol", widget: "string"}
              - {label: "Biografía", name: "bio", widget: "text"}
              - {label: "Imagen", name: "imagen", widget: "image"}